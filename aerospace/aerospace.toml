config-version = 2

# Start AeroSpace automatically on login
start-at-login = true

after-startup-command = []

# Mouse follows focus — cursor moves to focused window (like Hyprland)
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

# Default layout settings
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Gaps — the key visual setting for a riced look, adjust to taste
[gaps]
    inner.horizontal = 8
    inner.vertical   = 8
    outer.left       = 8
    outer.bottom     = 8
    outer.top        = 8
    outer.right      = 8

[key-mapping]
    preset = 'qwerty'

# ---------------------------------------------------------------------------
# Keybindings
# Defining this block COMPLETELY replaces AeroSpace defaults.
# Only what is written here is active — alt+a through alt+z will NOT open
# workspaces named by those letters. Only alt+1-5 switches workspaces.
# ---------------------------------------------------------------------------
[mode.main.binding]

    # --- Workspaces (1-5, add more if needed up to 9) ---
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'
    alt-t = 'workspace t'
    alt-c = 'workspace c'
    alt-b = 'workspace b'
    alt-n = 'workspace n'
    alt-m = 'workspace m'
    alt-w = 'workspace w'
    alt-x = 'workspace x'
    alt-d = 'workspace d'

    # --- Move window to workspace ---
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'
    alt-shift-t = 'move-node-to-workspace t'
    alt-shift-c = 'move-node-to-workspace c'
    alt-shift-b = 'move-node-to-workspace b'
    alt-shift-n = 'move-node-to-workspace n'
    alt-shift-m = 'move-node-to-workspace m'
    alt-shift-w = 'move-node-to-workspace w'
    alt-shift-x = 'move-node-to-workspace x'
    alt-shift-d = 'move-node-to-workspace d'
    # --- Focus windows (Hyprland/i3 style hjkl) ---
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # --- Move windows ---
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # --- Resize ---
    alt-shift-minus = 'resize smart -50'
    alt-shift-equal = 'resize smart +50'

    # --- Layout ---
    alt-r = 'layout horizontal vertical'        # toggle container orientation
    alt-shift-space = 'layout floating tiling'  # toggle float for current window

    # --- Spawn a new Ghostty terminal (always opens a NEW window, like Hyprland) ---
    alt-enter = 'exec-and-forget open -n /Applications/Ghostty.app'

    # --- Reload config ---
    alt-shift-semicolon = 'reload-config'

[workspace-to-monitor-force-assignment]
    1 = 'Built-in Retina Display'
    2 = 'Built-in Retina Display'
    3 = 'Built-in Retina Display'
    4 = 'Built-in Retina Display'
    5 = 'Built-in Retina Display'
    6 = 'Studio Display'
    7 = 'Studio Display'
    8 = 'Studio Display'
    9 = 'Studio Display'

exec-on-workspace-change = [
  '/bin/bash', '-c',
  '/opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]
